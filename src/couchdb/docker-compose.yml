services:
  couchdb:
    image: apache/couchdb:3
    container_name: get-it-done-couch
    hostname: getitdone
    restart: unless-stopped
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./couch_data:/opt/couchdb/data
      - ./local.ini:/opt/couchdb/etc/local.d/local.ini
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - reverse_proxy_network
      - default

  push-server:
    build: ../push-server
    container_name: get-it-done-push
    restart: unless-stopped
    environment:
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      COUCH_URL: http://couchdb:5984
      COUCH_USER: ${COUCHDB_USER:-admin}
      COUCH_PASSWORD: ${ADMIN_PASSWORD}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      couchdb:
        condition: service_healthy
    networks:
      - default
      - reverse_proxy_network

networks:
  default:
  reverse_proxy_network:
    external: true